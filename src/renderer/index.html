<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
                 script-src 'self' 'unsafe-inline';
                 style-src 'self' 'unsafe-inline';
                 font-src 'self';
                 img-src 'self' data:"
    />
    <title>Deck</title>
    <link rel="stylesheet" href="launcher-tokens.css" />
    <link rel="stylesheet" href="launcher-layout.css" />
    <link rel="stylesheet" href="launcher-components.css" />
  </head>
  <body>
    <div class="controls" data-interactive>
      <button class="theme-btn" id="themeBtn" type="button" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <div class="lang-seg" id="langSeg">
        <button type="button" data-lang="zh">中</button>
        <button type="button" data-lang="en" class="on">EN</button>
      </div>
    </div>

    <header>
      <span class="brand">Deck</span>
    </header>

    <main>
      <div class="content">
        <h1 data-i18n="title">Open a deck.</h1>

        <p class="lede" data-i18n="lede">Pick a file or folder. Or just drag one in.</p>

        <div class="actions">
          <button class="btn primary" id="open" data-interactive>
            <span data-i18n="openFile">Open file</span>
            <span class="kbd">⌘O</span>
          </button>
          <button class="btn secondary" id="openFolder" data-interactive>
            <span data-i18n="openFolder">Open folder</span>
            <span class="kbd">⌘⇧O</span>
          </button>
        </div>
      </div>

      <div class="visual" aria-hidden="true">
        <div class="card c-3">
          <span class="bar w-1"></span>
          <span class="bar w-2"></span>
          <span class="bar w-3"></span>
        </div>
        <div class="card c-2">
          <span class="bar w-1"></span>
          <span class="bar w-2"></span>
          <span class="bar w-3"></span>
        </div>
        <div class="card c-1">
          <span class="stage-dot"></span>
          <span class="bar w-1"></span>
          <span class="bar w-2"></span>
          <span class="bar w-3"></span>
        </div>
      </div>
    </main>

    <div class="drop-ring"></div>

    <script>
      const I18N = {
        en: {
          title: 'Open a deck.',
          lede: 'Pick a file or folder. Or just drag one in.',
          openFile: 'Open file',
          openFolder: 'Open folder',
        },
        zh: {
          title: '打开一份 Deck。',
          lede: '选一个文件或文件夹，或者直接拖进来。',
          openFile: '打开文件',
          openFolder: '打开文件夹',
        },
      }

      /* ===== Theme — follow system until user picks.
       * Icon swap is handled purely by CSS via [data-theme='dark'] selectors. */
      const systemDark = matchMedia('(prefers-color-scheme: dark)')
      const themeBtn = document.getElementById('themeBtn')

      function applyTheme(t, { persist = false } = {}) {
        document.documentElement.setAttribute('data-theme', t)
        if (persist) localStorage.setItem('theme', t)
        window.deckApp?.setChromeTheme?.(t)
      }

      const savedTheme = localStorage.getItem('theme')
      applyTheme(savedTheme || (systemDark.matches ? 'dark' : 'light'))
      systemDark.addEventListener?.('change', (e) => {
        if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light')
      })
      themeBtn.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme') || 'light'
        applyTheme(cur === 'dark' ? 'light' : 'dark', { persist: true })
      })

      function detectLang() {
        const saved = localStorage.getItem('lang')
        if (saved && I18N[saved]) return saved
        const langs =
          navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || 'en']
        for (const l of langs) {
          const low = (l || '').toLowerCase()
          if (low.startsWith('zh')) return 'zh'
          if (low.startsWith('en')) return 'en'
        }
        return 'en'
      }

      function applyI18n(lang) {
        localStorage.setItem('lang', lang)
        document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en')
        const dict = I18N[lang] || I18N.en
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const key = el.getAttribute('data-i18n')
          const val = dict[key] !== undefined ? dict[key] : I18N.en[key]
          if (val !== undefined) el.innerHTML = val
        })
        document.querySelectorAll('#langSeg button').forEach((b) => {
          b.classList.toggle('on', b.dataset.lang === lang)
        })
      }

      document.querySelectorAll('#langSeg button').forEach((b) => {
        b.addEventListener('click', () => applyI18n(b.dataset.lang))
      })

      const body = document.body
      document.getElementById('open')?.addEventListener('click', () => window.deckApp?.openDialog())
      document.getElementById('openFolder')?.addEventListener('click', () => window.deckApp?.openFolder())

      for (const evt of ['dragenter', 'dragover']) {
        window.addEventListener(evt, (e) => {
          e.preventDefault()
          body.classList.add('drag')
        })
      }
      // relatedTarget is null only when the pointer truly leaves the window;
      // dragleave also fires as the pointer crosses child-element borders
      // inside the window — ignore those to keep the highlight steady.
      window.addEventListener('dragleave', (e) => {
        if (e.relatedTarget === null) body.classList.remove('drag')
      })
      window.addEventListener('drop', (e) => {
        e.preventDefault()
        body.classList.remove('drag')
        const files = e.dataTransfer?.files
        if (!files || files.length === 0) return
        for (const f of files) window.deckApp?.openDroppedFile(f)
      })

      applyI18n(detectLang())
    </script>
  </body>
</html>
