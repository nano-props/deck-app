<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
                 script-src 'self' 'unsafe-inline';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 img-src 'self' data:"
    />
    <title>Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;450;500;600&family=Geist+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="launcher-tokens.css" />
    <link rel="stylesheet" href="launcher-layout.css" />
    <link rel="stylesheet" href="launcher-components.css" />
  </head>
  <body>
    <div class="lang-seg" id="langSeg" data-interactive>
      <button type="button" data-lang="zh">中</button>
      <button type="button" data-lang="en" class="on">EN</button>
    </div>

    <header>
      <span class="brand">Deck</span>
    </header>

    <main>
      <div class="content">
        <h1><span class="gradient" data-i18n="title">Open a Deck.</span></h1>

        <p class="lede" data-i18n="lede">
          Pick a <code>.deck</code> file, or a folder containing <code>deck.json</code>. Each opens in its own window.
        </p>

        <div class="actions">
          <button class="btn primary" id="open" data-interactive>
            <span data-i18n="openFile">Open .deck file</span>
            <span class="kbd">⌘O</span>
          </button>
          <button class="btn secondary" id="openFolder" data-interactive>
            <span data-i18n="openFolder">Open folder</span>
            <span class="kbd">⌘⇧O</span>
          </button>
        </div>
      </div>

      <div class="visual" aria-hidden="true">
        <div class="card c-3">
          <span class="bar w-1"></span>
          <span class="bar w-2"></span>
          <span class="bar w-3"></span>
        </div>
        <div class="card c-2">
          <span class="bar w-1"></span>
          <span class="bar w-2"></span>
          <span class="bar w-3"></span>
        </div>
        <div class="card c-1">
          <span class="stage-dot"></span>
          <span class="bar w-1"></span>
          <span class="bar w-2"></span>
          <span class="bar w-3"></span>
        </div>
      </div>
    </main>

    <footer>
      <span class="hint">
        <span class="drop-icon" aria-hidden="true">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path
              d="M5 1V7M5 7L2.5 4.5M5 7L7.5 4.5"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path d="M1.5 8.5H8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
          </svg>
        </span>
        <span data-i18n="dropHint">Or drag a file onto this window</span>
      </span>
    </footer>

    <div class="drop-ring"></div>

    <script>
      const I18N = {
        en: {
          title: 'Open a Deck.',
          lede: 'Pick a <code>.deck</code> file, or a folder containing <code>deck.json</code>. Each opens in its own window.',
          openFile: 'Open .deck file',
          openFolder: 'Open folder',
          dropHint: 'Or drag a file onto this window',
        },
        zh: {
          title: '打开一份 Deck。',
          lede: '选择一个 <code>.deck</code> 文件，或是包含 <code>deck.json</code> 的文件夹。每份都会在独立窗口中打开。',
          openFile: '打开 .deck 文件',
          openFolder: '打开文件夹',
          dropHint: '或直接将文件拖拽至此窗口',
        },
      }

      function detectLang() {
        const saved = localStorage.getItem('lang')
        if (saved && I18N[saved]) return saved
        const langs =
          navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || 'en']
        for (const l of langs) {
          const low = (l || '').toLowerCase()
          if (low.startsWith('zh')) return 'zh'
          if (low.startsWith('en')) return 'en'
        }
        return 'en'
      }

      function applyI18n(lang) {
        localStorage.setItem('lang', lang)
        document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en')
        const dict = I18N[lang] || I18N.en
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const key = el.getAttribute('data-i18n')
          const val = dict[key] !== undefined ? dict[key] : I18N.en[key]
          if (val !== undefined) el.innerHTML = val
        })
        document.querySelectorAll('#langSeg button').forEach((b) => {
          b.classList.toggle('on', b.dataset.lang === lang)
        })
      }

      document.querySelectorAll('#langSeg button').forEach((b) => {
        b.addEventListener('click', () => applyI18n(b.dataset.lang))
      })

      const body = document.body
      document.getElementById('open')?.addEventListener('click', () => window.deckApp?.openDialog())
      document.getElementById('openFolder')?.addEventListener('click', () => window.deckApp?.openFolder())

      for (const evt of ['dragenter', 'dragover']) {
        window.addEventListener(evt, (e) => {
          e.preventDefault()
          body.classList.add('drag')
        })
      }
      // relatedTarget is null only when the pointer truly leaves the window;
      // dragleave also fires as the pointer crosses child-element borders
      // inside the window — ignore those to keep the highlight steady.
      window.addEventListener('dragleave', (e) => {
        if (e.relatedTarget === null) body.classList.remove('drag')
      })
      window.addEventListener('drop', (e) => {
        e.preventDefault()
        body.classList.remove('drag')
        const files = e.dataTransfer?.files
        if (!files || files.length === 0) return
        for (const f of files) window.deckApp?.openDroppedFile(f)
      })

      applyI18n(detectLang())
    </script>
  </body>
</html>
