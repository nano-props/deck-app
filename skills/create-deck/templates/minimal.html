<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Deck</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #0b0b0f; color: #e8e8ea;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    .slide { height: 100vh; display: grid; place-items: center; padding: 48px;
      text-align: center; box-sizing: border-box; }
    .slide:not(.active) { display: none; }
    h1 { font-size: 64px; margin: 0; letter-spacing: -0.03em; }
    p { color: #9b9ba3; margin-top: 16px; }
    .counter { position: fixed; bottom: 16px; right: 20px; font-size: 12px; color: #636370; }
    kbd { font-family: ui-monospace, monospace; font-size: 12px; padding: 2px 6px;
      border: 1px solid #2f2f3a; border-radius: 4px; background: #16161d; }
  </style>
</head>
<body>
  <section class="slide active">
    <div>
      <h1>Hello, Deck</h1>
      <p>Press <kbd>→</kbd> or <kbd>Space</kbd> to advance</p>
    </div>
  </section>
  <section class="slide"><h1>Second slide</h1></section>
  <section class="slide"><h1>The end</h1></section>

  <div class="counter" id="counter"></div>

  <script>
    let i = 0;
    const slides = document.querySelectorAll('.slide');
    const counter = document.getElementById('counter');
    const show = (n) => {
      i = Math.max(0, Math.min(slides.length - 1, n));
      slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
      counter.textContent = `${i + 1} / ${slides.length}`;
    };
    show(0);
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') show(i + 1);
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') show(i - 1);
      if (e.key === 'Home') show(0);
      if (e.key === 'End') show(slides.length - 1);
    });
  </script>
</body>
</html>
